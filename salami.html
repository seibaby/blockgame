<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami & Monster: Dynamic Balance</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #222;
            margin: 20px auto;
            border: 4px solid #333;
            overflow: hidden;
        }
        #mouth {
            position: absolute;
            bottom: 20px;
            left: 175px;
            width: 50px;
            height: 30px;
            background-color: #ff4d4d;
            border-radius: 0 0 25px 25px;
            border: 2px solid white;
        }
        .falling-item {
            position: absolute;
            font-size: 24px;
            width: 30px;
            height: 30px;
            text-align: center;
        }
        #ui {
            width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
        }
        .bar-container {
            background-color: #444;
            width: 100%;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .bar {
            height: 100%;
            width: 50%;
            transition: width 0.1s;
        }
        #energyBar { background-color: #00bfff; width: 100%; }
        #heartBar { background-color: #39ff14; width: 0%; }
        #sodiumBar { background-color: #ff9900; width: 0%; }
        
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #00bfff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Salami & Monster: Dynamic Balance</h1>
    <p>High caffeine makes things fall faster. High sodium slows you down!</p>

    <div id="ui">
        <div class="stats-row">
            <span style="color: #ffff00;">Time Left: <span id="timerVal">60</span>s</span>
            <span style="color: #fff;">Score: <span id="scoreVal">0</span></span>
        </div>
        <div>Energy (Don't let hit 0%)</div>
        <div class="bar-container">
            <div id="energyBar" class="bar"></div>
        </div>
        <div>Heart Rate (Caffeine Speedometer)</div>
        <div class="bar-container">
            <div id="heartBar" class="bar"></div>
        </div>
        <div>Blood Pressure (Sodium Sluggishness)</div>
        <div class="bar-container">
            <div id="sodiumBar" class="bar"></div>
        </div>
    </div>

    <div id="gameContainer">
        <div id="mouth"></div>
        <div id="gameOverScreen">
            <h2 id="reason">GAME OVER</h2>
            <p style="font-size: 18px;">Final Score: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('gameContainer');
        const mouth = document.getElementById('mouth');
        const energyBar = document.getElementById('energyBar');
        const heartBar = document.getElementById('heartBar');
        const sodiumBar = document.getElementById('sodiumBar');
        const timerVal = document.getElementById('timerVal');
        const scoreVal = document.getElementById('scoreVal');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const reasonText = document.getElementById('reason');
        const finalScoreText = document.getElementById('finalScore');

        let mouthX = 175;
        const containerWidth = 400;
        const mouthWidth = 50;
        
        let timeLeft = 60;
        let score = 0;
        let energy = 100;
        let heartRate = 0;
        let sodium = 0;
        let gameActive = true;
        let items = [];
        let keys = {};
        let spawnTimeout, gameTimer;

        // Base Speeds
        const baseMoveSpeed = 8;
        const baseFallSpeed = 4;

        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        function spawnItem() {
            if (!gameActive) return;
            const item = document.createElement('div');
            item.classList.add('falling-item');
            
            const rand = Math.random();
            if (rand < 0.45) {
                item.innerText = '🥫'; // Monster
                item.dataset.type = 'monster';
            } else if (rand < 0.85) {
                item.innerText = '🥩'; // Salami
                item.dataset.type = 'salami';
            } else {
                item.innerText = '💧'; // Water
                item.dataset.type = 'water';
            }
            
            item.style.left = Math.floor(Math.random() * (containerWidth - 30)) + 'px';
            item.style.top = '0px';
            
            container.appendChild(item);
            items.push(item);

            // Spawning adjusts slightly dynamically based on current game state
            spawnTimeout = setTimeout(spawnItem, 600);
        }

        function updateTimer() {
            if (!gameActive) return;
            timeLeft--;
            timerVal.innerText = timeLeft;

            // Passive score for surviving
            score += 25;
            scoreVal.innerText = score;

            if (timeLeft <= 0) {
                endGame("YOU WIN! You survived the ultimate food coma!", "#39ff14");
            } else {
                gameTimer = setTimeout(updateTimer, 1000);
            }
        }

        function gameLoop() {
            if (!gameActive) return;

            // CALCULATE DYNAMIC SPEEDS
            // Sodium scales movement speed down significantly (from 8 down to a heavy 3)
            let currentMoveSpeed = baseMoveSpeed - (sodium * 0.05); 
            
            // Caffeine scales item falling speed up significantly (from 4 up to a frantic 9)
            let currentFallSpeed = baseFallSpeed + (heartRate * 0.05);

            // Player Movement
            if (keys['ArrowLeft'] && mouthX > 0) mouthX -= currentMoveSpeed;
            if (keys['ArrowRight'] && mouthX < containerWidth - mouthWidth) mouthX += currentMoveSpeed;
            mouth.style.left = mouthX + 'px';

            // Energy decay
            energy -= 0.18;

            // Update UI Bars
            energyBar.style.width = Math.max(0, Math.min(100, energy)) + '%';
            heartBar.style.width = Math.max(0, Math.min(100, heartRate)) + '%';
            sodiumBar.style.width = Math.max(0, Math.min(100, sodium)) + '%';

            // Check Defeat Conditions
            if (energy <= 0) endGame("You ran out of energy and fell asleep!", "#ff4d4d");
            if (heartRate >= 100) endGame("Heart rate too high! Caffeine overload.", "#ff4d4d");
            if (sodium >= 100) endGame("Blood pressure too high! Sodium overload.", "#ff4d4d");

            // Handle Falling Items
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                let top = parseInt(item.style.top);
                
                // Items move at the dynamic caffeine-fueled speed
                top += currentFallSpeed; 
                item.style.top = top + 'px';

                // Collision detection
                let itemX = parseInt(item.style.left);
                if (top >= 550 && top <= 585 && itemX + 30 >= mouthX && itemX <= mouthX + mouthWidth) {
                    if (item.dataset.type === 'monster') {
                        energy = Math.min(100, energy + 20);
                        heartRate += 18;
                        score += 10;
                    } else if (item.dataset.type === 'salami') {
                        energy = Math.min(100, energy + 15);
                        sodium += 18;
                        score += 15;
                    } else if (item.dataset.type === 'water') {
                        heartRate = Math.max(0, heartRate - 25);
                        sodium = Math.max(0, sodium - 25);
                        score += 5;
                    }
                    scoreVal.innerText = score;
                    item.remove();
                    items.splice(i, 1);
                    continue;
                }

                if (top > 600) {
                    item.remove();
                    items.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function endGame(reason, color) {
            gameActive = false;
            clearTimeout(spawnTimeout);
            clearTimeout(gameTimer);
            reasonText.innerText = reason;
            reasonText.style.color = color;
            finalScoreText.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            items.forEach(item => item.remove());
            items = [];
            
            timeLeft = 60;
            score = 0;
            energy = 100;
            heartRate = 0;
            sodium = 0;
            mouthX = 175;
            timerVal.innerText = timeLeft;
            scoreVal.innerText = score;
            
            gameOverScreen.style.display = 'none';
            gameActive = true;
            
            spawnItem();
            updateTimer();
            gameLoop();
        }

        // Start initial game
        spawnItem();
        updateTimer();
        gameLoop();
    </script>
</body>
</html>
